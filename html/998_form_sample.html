<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>웹 개발 교육 상담 문의</h1><br>
    <div>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해 드립니다.</div><br>    
    <main>
        <section> 
            <form action="#" method="get"></form>           
                <fieldset>
                    <Legend>상담 신청 정보</Legend>

                    <div><!-- 이름 -->
                        <label for="name">이름<sup>*</sup></label>
                        <input type="text">
                        <p>실명을 입력해 주세요.</p>
                    </div>
                    <div><!-- 이메일 -->
                        <label for="email">이메일<sup>*</sup></label>
                        <input type="text" name="email" placeholder="example@example.com">
                        <p>답변을 받을 이메일 주소를 입력해 주세요.</p>
                    </div>
                    <div><!-- 연락처 -->
                        <label for="phone">연락처</label>
                        <input type="tel" name="phone" placeholder="010-0000-0000">
                    </div>
                    <div><!-- 관심 과정 -->
                        <label for="course">관심 과정<sup>*</sup></label>
                        <select name="course">
                            <option value="선택">선택하세요</option>
                            <option value="html-css">HTML/CSS 기초</option>
                            <option value="javascript">JavaScript 입문</option>
                            <option value="react">React 프론트엔드</option>
                            <option value="fullstack">FullStackk 웹 개발</option>
                        </select>
                    </div>
                    <div>
                        <label for="message">문의 내용<sup>*</sup></label>
                        <textarea name="message
                        cols="20" rows="2"
                        placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
                        <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                    </div>
                    <div>
                        <input type="checkbox" name="agree" value="agree">
                        <label for="agree">개인정보 수집 및 이용에 동의합니다.<sup>*</sup></label>                
                    </div>
                    <div>
                        <button type="submit">상담 문의 보내기</button>
                    </div>
                </fieldset>
            </section>
            <section>
                <fieldset>
                    <legend>당신에 대해서 알고 싶어요!</legend>
                    <div>
                        <label for="hobby">취미를 선택해 주세요</label>
                        <input type="radio">
                    </div>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
