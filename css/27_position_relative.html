<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive=relative</title>
    <style>
    span {
        border: 5px solid blue;
        position: absolute;
        top: 200px;
        left: 100px;
    }
    .p {
        width: 600px;
        height: 300px;
        border: 2px solid green;
        position: relative;
    }
    </style>
</head>
<body>
    <h1>Positive-relative</h1>
    <div>element 1</div>
    <div class="p">
        <span>element 2</span>
    </div>

</body>
</html>
