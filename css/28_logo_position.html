<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Position</title>
    <style>
        .parent {
            box-sizing: border-box;
            position: relative;
            width: 260;
            height: 120px;
            padding: 20px;
            border: 1px solid #ccc;
        }
        .parent img {
            width: 100px;
            height: auto;
            display: block;
        }
        .child {
            position: absolute;
            top: 0px;
            left: 130px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Logo Position</h1>
    <div class="parent">
        <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="logo">
        <p class="child">STARBUCKS COFFEE</p>
    </div>
</body>
</html>
