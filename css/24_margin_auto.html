<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin-auto</title>
    <style>
        h1 {
            width: 50%;
            height: 200px;
            background-color: aquamarine;
            margin: auto;
        }
        div {
            width: 100%;
            height: 500px;
            background-color: tomato;
        }
        p {
            width: 800px;
            background-color: white;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>margin - auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.
             Quo doloribus voluptates voluptatum impedit error aperiam!
              Aspernatur temporibus officia delectus sint placeat error.
               Repudiandae voluptatem deserunt rerum ab,
                eveniet recusandae repellat.</p>
    </div>
</body>
</html>
