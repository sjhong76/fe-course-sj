<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBIS 일별 박스오피스</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px 10px;
            font-size: 14px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #999;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f3f3f3;
        }

        .message {
            margin-top: 15px;
            color: crimson;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>일별 박스오피스 조회</h1>

    <div class="search-box">
        <label for="searchDate">날짜 선택</label>
        <input type="date" id="searchDate" value="2026-01-01">

        <button id="btnDateSearch">날짜 조회</button>

        <label for="searchRank">순위 검색</label>
        <input type="number" id="searchRank" min="1" placeholder="예: 1">

        <button id="btnRankSearch">순위 검색</button>
        <button id="btnReset">전체 보기</button>
    </div>

    <div id="content"></div>

    <script src="./2_kobis__.js"></script>
</body>
</html>
